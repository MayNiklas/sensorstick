packages:
  - !include sensorstick-standalone.yaml

wifi:
  power_save_mode: none
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password

web_server:
  port: 80
  local: true
  ota: false

api:
  encryption:
    key: "JtHMlyh17rM9xxRo9+JTdLVS7XyuS8cjz/eoT6EkXys="

ota:
  - platform: esphome
    password: "ota_password_todo"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
    ssid:
      name: ESP Connected SSID
    mac_address:
      name: ESP Mac Wifi Address

sensor:
  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 10s
    entity_category: "diagnostic"

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: !lambda "return min(max(2 * (x + 100.0), 0.0), 100.0);"
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
